<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdfcf7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f4f1ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ede6;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="paperTexture" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="2" cy="2" r="0.5" fill="rgba(0,0,0,0.02)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#paperGrad)"/>
  <rect width="1200" height="400" fill="url(#paperTexture)"/>
  
  <!-- Main Title -->
  <text x="600" y="80" text-anchor="middle" 
        font-family="Georgia, serif" font-size="48" font-weight="900" 
        fill="#1a1a1a" letter-spacing="-2px">THE DAILY BRIEFING</text>
  
  <!-- Date -->
  <text x="600" y="120" text-anchor="middle" 
        font-family="'Courier New', monospace" font-size="20" 
        fill="#1a1a1a">SUNDAY, MARCH 29, 2026</text>
  
  <!-- Decorative line -->
  <line x1="300" y1="140" x2="900" y2="140" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Stats boxes -->
  
    <!-- Stats box 1 -->
    <rect x="150" y="180" width="200" height="100" 
          fill="rgba(255,255,255,0.8)" stroke="#4a4a4a" stroke-width="1"/>
    
    <text x="250" y="225" text-anchor="middle" 
          font-family="Georgia, serif" font-size="32" font-weight="bold" 
          fill="#8b0000">74</text>
    
    <text x="250" y="255" text-anchor="middle" 
          font-family="Georgia, serif" font-size="16" 
          fill="#1a1a1a">Articles Today</text>
    
    <!-- Stats box 2 -->
    <rect x="370" y="180" width="200" height="100" 
          fill="rgba(255,255,255,0.8)" stroke="#4a4a4a" stroke-width="1"/>
    
    <text x="470" y="225" text-anchor="middle" 
          font-family="Georgia, serif" font-size="32" font-weight="bold" 
          fill="#8b0000">9</text>
    
    <text x="470" y="255" text-anchor="middle" 
          font-family="Georgia, serif" font-size="16" 
          fill="#1a1a1a">Tech Categories</text>
    
    <!-- Stats box 3 -->
    <rect x="590" y="180" width="200" height="100" 
          fill="rgba(255,255,255,0.8)" stroke="#4a4a4a" stroke-width="1"/>
    
    <text x="690" y="225" text-anchor="middle" 
          font-family="Georgia, serif" font-size="32" font-weight="bold" 
          fill="#8b0000">✓</text>
    
    <text x="690" y="255" text-anchor="middle" 
          font-family="Georgia, serif" font-size="16" 
          fill="#1a1a1a">AI Powered</text>
    
    <!-- Stats box 4 -->
    <rect x="810" y="180" width="200" height="100" 
          fill="rgba(255,255,255,0.8)" stroke="#4a4a4a" stroke-width="1"/>
    
    <text x="910" y="225" text-anchor="middle" 
          font-family="Georgia, serif" font-size="32" font-weight="bold" 
          fill="#8b0000">08:03 PM</text>
    
    <text x="910" y="255" text-anchor="middle" 
          font-family="Georgia, serif" font-size="16" 
          fill="#1a1a1a">Updated</text>
    
  
  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" 
        font-family="Georgia, serif" font-size="18" font-style="italic"
        fill="#4a4a4a">"All the tech news that's fit to print"</text>
</svg>
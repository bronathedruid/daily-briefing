name: Daily Briefing Update

on:
  schedule:
    # Run at 8am EST (13:00 UTC) and 6pm EST (23:00 UTC)
    - cron: '0 13 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch news
        run: npm run fetch
        timeout-minutes: 5

      - name: Generate site
        run: npm run build

      - name: Commit data
        run: |
          git config user.name "Daily Briefing Bot"
          git config user.email "bot@daily-briefing.local"
          git add data/ public/
          git diff --staged --quiet || git commit -m "📰 Daily update $(date -u +%Y-%m-%d)"
          git push

  deploy:
    needs: fetch-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
